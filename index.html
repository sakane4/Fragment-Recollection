<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fragment Recollection</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'KoburiMincho';
      src: url('font/小ぶり明朝.ttf') format('truetype');
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* 全体的にテキスト選択を無効化(長押し操作やタップ時に文字選択が邪魔になるため)。入力欄は除外 */
    html, body, #app {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    /* ── スクロールバー ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-dim);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-border); }

    :root {
      --bg: #0d0f1a;
      --panel: #161826;
      --border: #2a2d42;
      --text: #d4cfc7;
      --muted: #6e6a7c;
      --accent: #1e90ff;
      --accent-dim: #1c3a5e;
      --accent-border: #3a6491;
      --accent-hover: #2a5580;
    }

    html, body {
      height: 100%;
      overscroll-behavior-y: none;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* ── アプリ全体のシェル ── */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100svh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    /* ── メインパネル(ログ) ── */
    #main-panel-wrap {
      position: relative;
      flex-shrink: 0;
    }
    #main-panel {
      overflow-y: auto;
      padding: 0.6rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      height: 100%;
    }

    /* ── 導きパネル(スライドオーバーレイ) ── */
    #guide-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 82%;
      max-width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      box-shadow: -6px 0 16px rgba(0,0,0,0.4);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 5;
      display: flex;
      flex-direction: column;
    }
    #guide-panel.open { transform: translateX(0); }
    #guide-panel.hidden { display: none; }
    #guide-panel-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.7rem;
      gap: 0.5rem;
      overflow-y: auto;
    }
    #guide-tab-btn {
      position: absolute;
      top: 14px;
      left: -28px;
      width: 28px;
      height: 64px;
      background: rgba(126, 200, 216, 0.14);
      border: 1px solid rgba(126, 200, 216, 0.5);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: var(--accent);
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
      cursor: pointer;
    }
    /* 導きの内容が更新されたとき、タブを発光させて気づかせる */
    #guide-tab-btn.glow {
      animation: guide-glow 1.4s ease-in-out infinite;
    }
    @keyframes guide-glow {
      0%, 100% { box-shadow: -2px 0 4px rgba(126,200,216,0.3); }
      50%      { box-shadow: -2px 0 16px 4px var(--accent); }
    }
    #guide-panel-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
    }
    .guide-hint-item {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.6;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .guide-hint-item:last-child { border-bottom: none; }

    /* ── 効果パネル(導きパネルと同じ仕組み、タブは下に並べる) ── */
    #effect-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 82%;
      max-width: 320px;
      background: var(--panel);
      border-left: 1px solid rgba(61, 220, 132, 0.45);
      box-shadow: -6px 0 16px rgba(0,0,0,0.4);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 5;
      display: flex;
      flex-direction: column;
    }
    #effect-panel.open { transform: translateX(0); }
    #effect-panel.hidden { display: none; }
    #effect-panel-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.7rem;
      gap: 0.5rem;
      overflow-y: auto;
    }
    #effect-tab-btn {
      position: absolute;
      top: 86px;
      left: -28px;
      width: 28px;
      height: 64px;
      background: rgba(61, 220, 132, 0.16);
      border: 1px solid rgba(61, 220, 132, 0.45);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: #6fe3a0;
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
      cursor: pointer;
    }
    /* 効果が発動中はタブを発光させる */
    #effect-tab-btn.glow {
      animation: effect-glow 1.4s ease-in-out infinite;
    }
    @keyframes effect-glow {
      0%, 100% { box-shadow: -1px 0 3px rgba(61,220,132,0.2); }
      50%      { box-shadow: -2px 0 8px 1px rgba(61,220,132,0.5); }
    }
    /* いずれかのサイドパネルを開いた時は、開いているパネル自身のタブだけを残す */
    #main-panel-wrap.side-panel-open .side-panel-tab { display: none; }
    #main-panel-wrap.side-panel-open .side-panel.open .side-panel-tab { display: block; }
    #effect-panel-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6fe3a0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
    }
    .effect-item {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.6;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .effect-item:last-child { border-bottom: none; }
    .effect-empty {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0.5rem 0;
    }

    /* ── 依頼パネル ── */
    #quest-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 82%;
      max-width: 320px;
      background: var(--panel);
      border-left: 1px solid rgba(232, 192, 122, 0.5);
      box-shadow: -6px 0 16px rgba(0,0,0,0.4);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 5;
      display: flex;
      flex-direction: column;
    }
    #quest-panel.open { transform: translateX(0); }
    #quest-panel.hidden { display: none; }
    #quest-panel-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.7rem;
      gap: 0.5rem;
      overflow-y: auto;
    }
    #quest-tab-btn {
      position: absolute;
      top: 158px;
      left: -28px;
      width: 28px;
      height: 64px;
      background: rgba(232, 192, 122, 0.14);
      border: 1px solid rgba(232, 192, 122, 0.5);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: #e8c07a;
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
      cursor: pointer;
    }
    #quest-tab-btn.glow,
    #quest-tab-btn.ready {
      animation: quest-glow 1.4s ease-in-out infinite;
    }
    @keyframes quest-glow {
      0%, 100% { box-shadow: -1px 0 4px rgba(232,192,122,0.25); }
      50%      { box-shadow: -2px 0 12px 2px rgba(232,192,122,0.65); }
    }
    #quest-panel-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e8c07a;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
    }
    #quest-filter {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.2rem;
    }
    .quest-filter-btn {
      padding: 0.28rem 0.1rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: #737a91;
      font-size: 0.72rem;
      cursor: pointer;
    }
    .quest-filter-btn:hover {
      color: var(--text);
    }
    .quest-filter-btn.active {
      border-color: rgba(232, 192, 122, 0.42);
      background: rgba(232, 192, 122, 0.09);
      color: #e8c07a;
    }
    .quest-filter-empty {
      padding: 1.25rem 0.5rem;
      color: var(--muted);
      font-size: 0.7rem;
      text-align: center;
    }
    .quest-card {
      padding: 0.65rem;
      border: 1px solid #41485f;
      border-radius: 7px;
      background: rgba(255,255,255,0.025);
    }
    .quest-card--reported { opacity: 0.65; }
    .quest-title { color: var(--text); font-size: 0.86rem; font-weight: 600; }
    .quest-card--available {
      display: grid;
      grid-template-columns: 1.75rem minmax(0, 1fr);
      gap: 0.5rem;
      padding: 0.5rem 0.55rem;
      border-style: dashed;
    }
    .quest-rumor-icon, .quest-dialog-icon {
      display: grid;
      place-items: center;
      border: 1px solid #3b4058;
      border-radius: 50%;
      color: #747b94;
    }
    .quest-rumor-icon { width: 1.5rem; height: 1.5rem; font-style: italic; }
    .quest-rumor-main { min-width: 0; }
    .quest-rumor-kicker {
      color: #747b94;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
    }
    .quest-card--available .quest-title {
      margin-top: 0.1rem;
      color: #969caf;
      font-style: italic;
      font-weight: 400;
      font-size: 0.72rem;
      line-height: 1.4;
    }
    .quest-rumor-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.55rem;
      margin-top: 0.35rem;
    }
    .quest-rumor-actions .quest-progress {
      flex: 1;
      padding: 0;
      border-bottom: none;
      font-size: 0.68rem;
    }
    .quest-rumor-actions .quest-progress::before {
      content: '手がかり';
      color: #5f657e;
      margin-right: 0.35rem;
    }
    .quest-rumor-actions .quest-turnin-btn {
      width: auto;
      min-width: 5.4rem;
      margin-top: 0;
      padding: 0.28rem 0.55rem;
      font-size: 0.7rem;
    }
    .quest-requester { color: #e8c07a; font-size: 0.68rem; margin-top: 0.12rem; }
    .quest-layout {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      gap: 0.55rem;
      align-items: stretch;
    }
    .quest-left { min-width: 0; }
    .quest-header {
      display: grid;
      grid-template-columns: 1.75rem minmax(0, 1fr) 1.7rem;
      gap: 0.5rem;
      align-items: center;
      grid-column: 1 / -1;
    }
    .quest-details-toggle {
      width: 1.7rem;
      height: 1.7rem;
      padding: 0;
      border: 1px solid #343a52;
      border-radius: 5px;
      background: transparent;
      color: #8c93aa;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
    }
    .quest-details-toggle:hover {
      color: var(--text);
      border-color: #555e7d;
    }
    .quest-layout--collapsed .quest-left,
    .quest-layout--collapsed .quest-reward-panel,
    .quest-layout--collapsed .quest-action-row {
      display: none;
    }
    .quest-heading {
      display: flex;
      align-items: baseline;
      gap: 0.45rem;
      min-width: 0;
      white-space: nowrap;
    }
    .quest-heading .quest-requester {
      margin-top: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quest-dialog {
      margin-top: 0;
    }
    .quest-dialog-icon { width: 1.75rem; height: 1.75rem; }
    .quest-comment {
      position: relative;
      min-height: 2.25rem;
      padding: 0.42rem 0.5rem;
      border: 1px solid #2d334a;
      border-radius: 7px;
      background: #151827;
      color: #aeb3c7;
      font-size: 0.68rem;
      line-height: 1.55;
    }
    .quest-comment::before {
      content: '';
      position: absolute;
      left: 0.45rem;
      top: -0.42rem;
      border-width: 0 0.3rem 0.42rem 0.3rem;
      border-style: solid;
      border-color: transparent transparent #2d334a transparent;
    }
    .quest-reward-panel {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-left: 0.55rem;
      border-left: 1px solid #2b3046;
      min-width: 0;
    }
    .quest-reward-label {
      color: #9299ad;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-align: center;
    }
    .quest-reward-panel .quest-resource-list {
      justify-content: center;
      margin-top: 0.35rem;
    }
    .quest-reward-panel .quest-resource-chip {
      font-size: 0.72rem;
    }
    .quest-reward-panel .quest-resource-name {
      max-width: 6rem;
    }
    .quest-reward-empty {
      margin-top: 0.2rem;
      color: #666d82;
      font-size: 0.65rem;
    }
    .quest-action-row {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr) auto 3.7rem;
      gap: 0.45rem;
      align-items: center;
      padding-top: 0.45rem;
      border-top: 1px solid #292f44;
      min-width: 0;
    }
    .quest-action-goal {
      overflow: hidden;
      color: #aeb3c7;
      font-size: 0.65rem;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .quest-action-progress {
      color: #6da9c8;
      font-size: 0.64rem;
      white-space: nowrap;
    }
    .quest-action-progress.done { color: #67d391; }
    .quest-action-row .quest-resource-list {
      margin-top: 0;
    }
    .quest-action-row .quest-turnin-btn {
      margin-top: 0;
      padding: 0.25rem 0.15rem;
      font-size: 0.62rem;
    }
    .quest-action-slot { text-align: center; }
    .quest-layout--reported .quest-reward-panel {
      opacity: 0.55;
    }
    .quest-goal {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      padding-left: 0.55rem;
      border-left: 1px solid #2b3046;
      color: var(--muted);
      font-size: 0.62rem;
      line-height: 1.45;
    }
    .quest-goal-main {
      overflow: hidden;
      color: #8e94a9;
      font-size: 0.59rem;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .quest-goal-status {
      margin-top: 0.2rem;
      color: #6da9c8;
      font-size: 1rem;
      line-height: 1;
      text-align: right;
    }
    .quest-goal-status.done { color: #67d391; }
    .quest-goal-progress {
      margin-top: 0.22rem;
      color: #6da9c8;
      font-size: 0.68rem;
      text-align: right;
    }
    .quest-inline-check {
      margin-left: auto;
      color: #67d391;
      font-size: 0.82rem;
      line-height: 1;
    }
    .quest-resource-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.18rem 0.3rem;
      margin-top: 0.28rem;
    }
    .quest-resource-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      color: #b8bdcc;
      font-size: 0.61rem;
      white-space: nowrap;
    }
    .quest-resource-name {
      overflow: hidden;
      max-width: 5.2rem;
      font-weight: 600;
      text-overflow: ellipsis;
    }
    .quest-requirement-list::before {
      content: '必要';
      color: #777e94;
      font-size: 0.58rem;
    }
    .quest-reward-list {
      padding-top: 0.25rem;
      border-top: 1px dotted #30364c;
      opacity: 0.82;
    }
    .quest-reward-list::before {
      content: '+';
      color: #e8c07a;
      font-size: 0.65rem;
    }
    .quest-layout--reported .quest-goal-main,
    .quest-layout--reported .quest-reward-list {
      opacity: 0.55;
    }
    .quest-goal .quest-turnin-btn {
      margin-top: 0.32rem;
      padding: 0.25rem 0.15rem;
      font-size: 0.64rem;
    }
    .quest-description { color: var(--muted); font-size: 0.74rem; line-height: 1.55; margin-top: 0.45rem; }
    .quest-progress {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.55rem;
      color: var(--text);
      font-size: 0.76rem;
    }
    .quest-reward { color: var(--muted); font-size: 0.7rem; margin-top: 0.35rem; }
    .quest-turnin-btn {
      width: 100%;
      margin-top: 0.55rem;
      padding: 0.42rem;
      border: 1px solid rgba(232,192,122,0.5);
      border-radius: 6px;
      background: rgba(232,192,122,0.12);
      color: #e8c07a;
      font-family: inherit;
      cursor: pointer;
    }
    .quest-turnin-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .quest-reported { color: var(--muted); font-size: 0.72rem; margin-top: 0.45rem; }

    /* ── リサイザー ── */
    #resizer {
      height: 8px;
      cursor: ns-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }

    #resizer::after {
      content: '';
      display: block;
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
    }

    #resizer:hover::after,
    #resizer.dragging::after {
      background: var(--accent);
    }

    .log-entry {
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--muted);
      border-left: 2px solid var(--border);
      padding-left: 0.6rem;
    }

    .log-entry.highlight {
      color: var(--text);
      border-left-color: var(--accent);
    }

    .log-entry.log-rare {
      background: linear-gradient(90deg, rgba(125,185,220,0.28) 0%, rgba(125,185,220,0.06) 60%, transparent 100%);
      border-left-color: #7db9dc;
      border-left-width: 3px;
      color: var(--text);
    }

    .log-entry--right {
      text-align: right;
      border-left: none;
      border-right: 2px solid var(--accent);
      padding-left: 0;
      padding-right: 0.6rem;
      color: var(--text);
    }

    /* ── アクション行 ── */
    #action-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    #action-picker-btn {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #action-picker-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #action-picker-btn::after { content: '▾'; color: var(--muted); font-size: 0.75rem; }

    /* ── 行動ビュー ── */
    /* ── 行動メニュー ── */
    .action-section { margin-bottom: 0.5rem; }

    .action-place-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
      cursor: pointer;
      user-select: none;
    }
    .action-place-toggle {
      font-size: 9px;
      color: var(--muted);
      transition: transform 0.2s;
      display: inline-block;
      opacity: 0.5;
    }
    .action-section.open .action-place-toggle { transform: rotate(90deg); }
    .action-place-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .action-rows {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
      padding-left: 6px;
    }
    .action-section.open .action-rows {
      max-height: 600px;
      margin-top: 4px;
    }

    .action-row {
      display: flex;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .action-row:last-child { border-bottom: none; }
    .action-row:hover { background: var(--accent-dim); }
    .action-row.selected { box-shadow: inset 0 0 0 1px var(--accent); }
    .action-row.running { opacity: 0.6; }

    .action-row-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-row-icon svg { display: block; }

    .action-row-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      min-width: 3em;
    }
    .action-row-lv {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
    }
    .action-row-desc {
      font-size: 0.72rem;
      color: var(--muted);
      flex: 1;
    }
    .action-row-time {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .action-play-btn-unused {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid var(--accent-border);
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 2px;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-play-btn:hover { background: var(--accent-dim); }
    .action-play-btn.running {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    #action-btn {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    #action-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #world-lv-display { cursor: pointer; }
    #worldlv-popup .location-popup-inner {
      position: fixed;
      left: 50%;
      top: 70px;
      transform: translateX(-50%);
    }
    .worldlv-popup-bar-wrap {
      width: 220px;
      height: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin: 10px 0;
    }
    .worldlv-popup-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
    }
    #worldlv-popup.is-capped .worldlv-popup-bar-fill {
      background: #686b76;
      transition: none;
    }
    #worldlv-popup.is-capped .worldlv-popup-bar-wrap {
      border-color: #555864;
    }
    #worldlv-popup.is-capped #worldlv-popup-label {
      color: var(--muted);
      line-height: 1.6;
      max-width: 260px;
    }

    /* プログレスバーはメインパネルの下端 */
    #progress-wrap {
      height: 3px;
      background: var(--panel);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }
    /* オート再開のクールタイム中、プログレスバーをゆっくり0%へ戻す */
    #progress-bar.cooldown {
      transition: width 2s linear;
    }

    /* ── サブパネル ── */
    #sub-panel {
      overflow-y: auto;
      padding: 0.6rem 0.75rem;
      flex: 1;
      min-height: 80px;
      touch-action: pan-y;
    }

    .sub-view { display: none; }
    .sub-view.active { display: block; }

    .sub-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .story-list-title {
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .resource-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.2rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .resource-row:last-child { border-bottom: none; }

    .resource-section + .resource-section { margin-top: 0.9rem; }
    .resource-section-title {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 0.2rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }

    .resource-name { color: var(--muted); }
    .resource-val {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-size: 1rem;
    }

    .placeholder {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      margin-top: 2rem;
    }

    /* ── ヘッダー ── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 1rem;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    #header-title {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    /* ── 物語ビュー(サブパネル内) ── */
    .story-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }

    .story-item:last-child { border-bottom: none; }

    .story-section-divider {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin: 0.9rem 0 0.3rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .story-item.unlocked:hover { background: rgba(255,255,255,0.03); }

    .story-item-title {
      font-size: 0.88rem;
      color: var(--text);
      flex: 1;
    }

    .story-item-title.locked { color: var(--muted); }

    .story-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
      transition: background 0.15s, opacity 0.15s;
    }

    .story-btn:hover { background: var(--accent-hover); }
    .story-btn.locked {
      background: none;
      color: var(--muted);
      border-color: var(--border);
    }
    .story-btn.locked:hover { background: #1e2030; }

    .story-open-btn {
      flex-shrink: 0;
      font-size: 0.85rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
    }
    .story-open-btn:hover { background: var(--accent-dim); }

    .story-cost {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── 物語ポップアップオーバーレイ ── */
    #story-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #story-overlay.open { display: flex; }

    #world-chronicle-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 210;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(8, 9, 14, 0.86);
    }
    #world-chronicle-overlay.open { display: flex; }
    .world-chronicle {
      width: min(680px, 100%);
      max-height: min(78vh, 760px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    }
    .world-chronicle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .world-chronicle-title { color: var(--accent); font-size: 1rem; }
    .world-chronicle-meta { color: var(--muted); font-size: 0.75rem; }
    #world-chronicle-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
    }
    #world-chronicle-list {
      overflow-y: auto;
      padding: 0.5rem 1rem 1rem;
    }
    .chronicle-entry {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .chronicle-entry-title { color: var(--muted); font-size: 0.9rem; }
    .chronicle-entry.restored .chronicle-entry-title { color: var(--text); }
    .chronicle-entry-body {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.7;
    }
    .chronicle-entry.restored .chronicle-entry-body { color: var(--text); }
    .chronicle-entry-progress {
      margin-top: 0.6rem;
      color: var(--accent);
      font-size: 0.75rem;
    }

    #story-viewer {
      position: relative;
      width: 100%;
      max-width: 480px;
      height:75svh;
      background: #12141f;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
    }

    #story-viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem 0.7rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #story-viewer-title {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      transition: opacity 1s;
    }

    #story-close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
    }

    #story-close-btn:hover { color: var(--text); }

    .story-viewer-actions {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    #story-mode-toggle-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      line-height: 0;
      padding: 0.2rem 0.4rem;
      display: flex;
      align-items: center;
    }
    #story-mode-toggle-btn:hover { color: var(--accent); }
    #story-mode-toggle-btn svg { display: block; }

    .story-scroll-end {
      align-self: center;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      padding: 1rem 0 0.5rem;
      user-select: none;
    }

    #story-body {
      overflow-y: auto;
      flex: 1;
      padding: 1.5rem 1.25rem 2rem;
      font-size: 0.9rem;
      line-height: 1.2;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @keyframes story-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .story-page {
      white-space: pre-wrap;
      font-family: 'KoburiMincho', 'Shippori Mincho', serif;
      margin-bottom: 0.5lh;
    }

    .story-page-new {
      animation: story-fadein 1.2s ease both;
    }

    

    .story-next-btn {
      align-self: center;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .story-next-btn:hover { background: var(--accent-hover); }

    .memory-cost-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .memory-ring {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      transform: rotate(-90deg);
    }
    .memory-ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
    }
    .memory-ring-fill {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease, stroke 0.4s ease;
    }
    .memory-cost-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.1rem;
    }
    .memory-resource-name {
      font-size: 0.75rem;
      color: var(--text);
    }
    .memory-counts {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .memory-cost-item.enough .memory-counts {
      color: var(--accent);
    }


    #viewer-toast {
      position: absolute;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 35, 0.92);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 0.45rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #viewer-toast.visible { opacity: 1; }

    #story-fin-bar {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      padding: 0.75rem 0;
      user-select: none;
    }
    #story-fin-bar:empty { display: none; }

    .story-title-reveal-btn {
      display: block;
      margin: 0.6rem auto 0;
      font-size: 0.78rem;
      letter-spacing: normal;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      border: 1px solid var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
      cursor: pointer;
    }
    .story-title-reveal-btn:hover { background: var(--accent-hover); }

    .story-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      width: 100%;
    }
    .story-nav-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem 0.5rem;
      opacity: 0.7;
    }
    .story-nav-btn:disabled { opacity: 0.2; cursor: default; }
    .story-nav-btn:not(:disabled):hover { opacity: 1; }
    @keyframes nav-blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .story-nav-btn--blink {
      animation: nav-blink 0.6s ease-in-out 3;
    }
    .story-nav-info {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
    }

    /* ── チュートリアルオーバーレイ ── */
    #tutorial-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    #tutorial-overlay.open { display: flex; }

    #tutorial-box {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem 5rem;
      color: var(--text);
    }

    #tutorial-text {
      font-size: 0.95rem;
      line-height: 2;
      white-space: pre-wrap;
      text-align: center;
      min-height: 6rem;
    }

    #tutorial-indicator {
      position: absolute;
      bottom: 1rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: var(--accent);
      animation: blink 1s step-start infinite;
    }

    #tutorial-btn[hidden],
    #tutorial-indicator[hidden] { display: none; }

    #tutorial-btn {
      display: block;
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 2rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #tutorial-btn:hover { background: var(--accent-hover); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── アクションバー ガイド ── */
    #action-guide-wrap {
      position: relative;
      height: 0;
      overflow: visible;
      pointer-events: none;
    }
    #action-guide {
      left: 50%;
    }

    /* ── ストーリーログ(メインパネル内) ── */
    .story-log {
      text-align: center;
      color: var(--text);
      font-size: 0.88rem;
      line-height: 1.9;
      border-left: none !important;
      padding-left: 0 !important;
    }

    .story-tap-indicator {
      text-align: center;
      color: var(--accent);
      font-size: 0.75rem;
      animation: blink 0.9s step-start infinite;
    }

    .story-name-prompt {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .story-name-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .story-name-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 0.3rem 0.6rem;
      font-size: 0.9rem;
      width: 140px;
      text-align: center;
    }

    .story-name-row button {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .story-end-btn {
      margin-top: 0.5rem;
      padding: 0.45rem 1.5rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .story-end-btn:hover { background: var(--accent-hover); }
    .story-end-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .story-choice-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .story-choice-btn {
      min-width: 60%;
      padding: 0.45rem 1.2rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .story-choice-btn:hover { background: var(--accent-hover); }
    .story-choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 施設メニュー(展開パネル+カードグリッド) ── */
    .facility-panel {
      position: relative;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.8rem;
      background: var(--panel);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      clip-path: inset(0);
    }
    .facility-panel::before,
    .facility-panel::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--accent-border);
      opacity: 0;
      pointer-events: none;
    }
    .facility-panel::before { top: 0; }
    .facility-panel::after { bottom: 0; }
    .facility-panel.facility-panel-closing {
      box-sizing: border-box;
      overflow: hidden;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
      transition:
        background 0.3s ease,
        border-color 0.3s ease;
    }
    .facility-panel.facility-panel-closing::before {
      top: calc(50% - 0.5px);
      opacity: 0.72;
      transition:
        top 0.48s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.15s ease;
    }
    .facility-panel.facility-panel-closing::after {
      bottom: calc(50% - 0.5px);
      opacity: 0.72;
      transition:
        bottom 0.48s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.15s ease;
    }
    .facility-panel.facility-panel-closing.facility-panel-collapse-height {
      height: 1px !important;
      min-height: 1px;
      margin-top: 0.8rem;
      margin-bottom: 0.35rem;
      padding-top: 0;
      padding-bottom: 0;
      border-radius: 0;
      transition:
        height 0.24s cubic-bezier(0.4, 0, 0.2, 1),
        padding 0.24s cubic-bezier(0.4, 0, 0.2, 1),
        margin 0.24s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .facility-panel.facility-panel-closing > * {
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .facility-panel-divider {
      width: 100%;
      flex: 0 0 1px;
      height: 1px;
      min-height: 1px;
      margin-top: 0.65rem;
      background: var(--accent);
      opacity: 0.58;
      box-shadow: 0 0 4px rgba(126,200,216,0.24);
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .facility-panel.facility-panel-closing {
        transition-duration: 0.01ms;
      }
      .facility-panel.facility-panel-closing::before,
      .facility-panel.facility-panel-closing::after,
      .facility-panel.facility-panel-collapse-height {
        transition-duration: 0.01ms;
      }
    }
    .facility-panel-header {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding-bottom: 0.6rem;
      margin-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .facility-panel-icon { color: var(--accent); flex-shrink: 0; }
    .facility-panel-icon svg { width: 22px; height: 22px; display: block; }
    .facility-panel-titlewrap { flex: 1; padding-right: 3.5rem; }
    .facility-panel-title { font-size: 1rem; font-weight: bold; color: var(--text); }
    .facility-panel-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .facility-panel-exit {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      color: var(--muted);
      font-size: 0.7rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .facility-panel-exit svg { width: 14px; height: 14px; display: block; }
    .facility-panel-exit:hover { background: var(--accent-dim); }
    .facility-panel-exit:disabled { opacity: 0.4; cursor: not-allowed; }

    .facility-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      width: 100%;
    }
    /* 3枚のとき: 最初のカードが左列を2行占め、右列に残り2枚が縦並び */
    .facility-grid > :first-child:nth-last-child(3) {
      grid-row: span 2;
    }
    /* 右列の小カード（1行分）はアイコン+ラベルを横並びに */
    .facility-grid > :first-child:nth-last-child(3) ~ .facility-card {
      flex-direction: row;
      justify-content: flex-start;
      gap: 0.4rem;
      padding: 0.45rem 0.75rem;
    }
    .facility-grid > :first-child:nth-last-child(3) ~ .facility-card .facility-card-icon svg {
      width: 16px;
      height: 16px;
    }
    .facility-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.55rem 0.6rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .facility-card:hover { background: var(--accent-hover); }
    .facility-card:disabled { opacity: 0.4; cursor: not-allowed; }
    .facility-card-icon svg { width: 26px; height: 26px; }
    .facility-card-label { line-height: 1.3; text-align: center; }

    /* 図書館の復元メニュー。全体のUIに合わせた抽象的な本棚 */
    .facility-bookshelf {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 0.4rem;
      min-height: 132px;
      padding: 0.75rem 0.9rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.018);
      overflow: hidden;
    }
    .facility-bookshelf::after {
      content: "";
      position: absolute;
      left: 0.65rem;
      right: 0.65rem;
      bottom: 0.65rem;
      height: 1px;
      background: var(--border);
      pointer-events: none;
    }
    .facility-book {
      position: relative;
      z-index: 1;
      width: var(--book-width, 34px);
      height: 116px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 3px 7px;
      border: 1px solid rgba(126,200,216,0.5);
      border-radius: 4px 4px 2px 2px;
      color: var(--accent);
      background: rgba(126,200,216,0.08);
      box-shadow: inset 2px 0 rgba(126,200,216,0.12);
      font-family: inherit;
      cursor: pointer;
      transform-origin: bottom center;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .facility-book[data-book-tone="flower"] {
      height: 108px;
      color: #79d6a2;
      border-color: rgba(121,214,162,0.5);
      background: rgba(121,214,162,0.07);
      box-shadow: inset 2px 0 rgba(121,214,162,0.12);
    }
    .facility-book[data-book-tone="magic"] {
      color: #b89ae8;
      border-color: rgba(184,154,232,0.5);
      background: rgba(184,154,232,0.07);
      box-shadow: inset 2px 0 rgba(184,154,232,0.12);
    }
    .facility-book[data-book-tone="labyrinth"] {
      height: 112px;
      color: #d9bd78;
      border-color: rgba(217,189,120,0.5);
      background: rgba(217,189,120,0.07);
      box-shadow: inset 2px 0 rgba(217,189,120,0.12);
    }
    .facility-book[data-book-tone="cooking"] {
      height: 124px;
      color: #e5a08e;
      border-color: rgba(229,160,142,0.5);
      background: rgba(229,160,142,0.07);
      box-shadow: inset 2px 0 rgba(229,160,142,0.12);
    }
    .facility-book[data-book-tone="locked"] {
      color: var(--muted);
      border-color: var(--border);
      background: rgba(255,255,255,0.025);
      box-shadow: none;
    }
    .facility-book:hover:not(:disabled) {
      transform: translateY(-4px);
    }
    .facility-book:focus,
    .facility-book:active {
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .facility-book:disabled { opacity: 0.48; cursor: not-allowed; }
    .facility-book-label {
      writing-mode: vertical-rl;
      white-space: nowrap;
      letter-spacing: 0.04em;
      font-size: var(--book-font-size, 0.72rem);
      line-height: 1.1;
    }
    .facility-book-icon svg { width: 13px; height: 13px; display: block; }
    .facility-book-ornament {
      width: 70%;
      border-top: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      height: 3px;
      opacity: 0.65;
    }

    .facility-shop-balance {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .facility-shop-balance b { color: var(--accent); font-weight: bold; }
    .facility-talk-speaker {
      margin-bottom: 0.45rem;
      color: #e8c07a;
      font-size: 0.72rem;
    }
    .facility-talk-dialogue {
      min-height: 3.2rem;
      color: var(--text);
      font-size: 0.78rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .facility-list {
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .facility-list-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.5rem 0.2rem;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }
    .facility-list-row:last-child { border-bottom: none; }
    .facility-list-row:hover { background: var(--accent-dim); }
    .facility-list-row:disabled { opacity: 0.4; cursor: not-allowed; }
    .facility-list-row .facility-card-icon { color: var(--accent); flex-shrink: 0; }
    .facility-list-row .facility-card-icon svg { width: 18px; height: 18px; display: block; }
    .facility-list-row-label { flex: 1; }
    .facility-shop-item-name { color: var(--text); }
    .facility-shop-item-desc {
      margin-left: 0.5rem;
      color: var(--muted);
      font-size: 0.7rem;
    }
    .facility-shop-item-price {
      float: right;
      margin-left: 0.65rem;
      color: var(--accent);
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .facility-list-empty {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 0.6rem 0;
    }

    /* ── フッタータブ ── */
    #footer {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    /* ── 場所詳細ポップアップ ── */
    .location-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }
    .location-popup.open { display: block; }
    .equip-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }
    .equip-popup.open { display: flex; }
    .equip-popup-inner {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      min-width: 200px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .equip-popup-title {
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .equip-popup-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .equip-popup-item {
      text-align: left;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }
    .equip-popup-item:hover { background: var(--accent-dim); }
    .convert-box-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      margin-bottom: 0.6rem;
    }
    .convert-box {
      width: 100%;
      min-width: 220px;
      padding: 0.5rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      text-align: center;
    }
    .convert-box.is-selected { border-color: var(--accent); color: var(--accent); }
    .convert-box-arrow {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .convert-slider {
      width: 100%;
      margin: 0.3rem 0;
    }
    .convert-amount-label {
      font-size: 0.8rem;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .convert-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.6rem 0;
    }
    .convert-fragment-list {
      display: flex;
      flex-direction: column;
    }
    .convert-fragment-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .convert-fragment-item:hover .resource-row { background: var(--accent-dim); }
    .convert-fragment-item.selected .resource-name,
    .convert-fragment-item.selected .resource-val { color: var(--accent); }
    .equip-popup-empty {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.4rem 0.2rem;
    }
    .confirm-popup-message {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
      padding: 0.2rem 0.2rem 0.6rem;
    }
    .confirm-popup-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .confirm-popup-buttons .equip-popup-item {
      flex: 1;
      text-align: center;
    }
    #confirm-popup-yes { color: var(--accent); }
    .companion-equip-btn {
      font-size: 0.78rem;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      align-self: flex-start;
    }
    .companion-equip-btn:hover { background: var(--accent-dim); }
    .companion-equip-btn:disabled { opacity: 0.4; cursor: default; }
    .companion-equip-btn:disabled:hover { background: transparent; }
    .companion-level-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .companion-skill-convert-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .convert-task-bar-wrap {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      overflow: hidden;
    }
    .convert-task-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s linear;
    }
    .location-popup-inner {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      max-width: 240px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .location-popup-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .location-popup-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .location-popup-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .location-popup-lv {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .location-popup-lvup-btn {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 0.6rem 0.5rem;
      font-size: 0.8rem;
      font-family: inherit;
      border-radius: 5px;
      border: 1px solid var(--accent-border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      text-align: left;
      user-select: none;
      touch-action: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .lvup-progress {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: var(--accent);
      opacity: 0.2;
      pointer-events: none;
      transition: none;
    }
    .location-popup-lvup-btn.ready {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .location-popup-lvup-btn.ready .lvup-btn-cost,
    .location-popup-lvup-btn.ready .lvup-btn-ratio {
      color: #fff;
    }
    .location-popup-lvup-btn.ready .lvup-progress { display: none; }
    .location-popup-lvup-btn:disabled {
      cursor: not-allowed;
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .location-popup-lvup-btn.capped {
      cursor: default;
      border-color: var(--border);
      border-style: dashed;
      justify-content: center;
    }
    .lvup-btn-capped {
      font-size: 0.74rem;
      color: var(--muted);
      text-align: center;
    }
    .lvup-btn-label { flex: 1; }
    .lvup-btn-cost {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .lvup-btn-ratio { color: var(--muted); }
    .lvup-have-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: right;
      margin-bottom: 0.25rem;
    }

    .location-info-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: opacity 0.15s;
      flex-shrink: 0;
      opacity: 0.7;
      filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(190deg) brightness(1.4);
    }
    .location-info-btn:hover { opacity: 1; }
    .location-info-btn img { width: 14px; height: 14px; display: block; }
    /* LocationLvを今すぐ上げられる時、アイコン自体を点滅させる */
    .location-info-btn.glow {
      animation: location-info-glow 1s ease-in-out infinite;
    }
    @keyframes location-info-glow {
      0%, 100% { opacity: 1; filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(190deg) brightness(1.4); }
      50%      { opacity: 0.25; filter: brightness(0) invert(1) sepia(1) saturate(4) hue-rotate(190deg) brightness(2.2); }
    }

    #world-lv-display {
      margin-left: auto;
      padding: 0 0.8rem;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    #refresh-btn,
    #settings-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      padding: 5px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    #refresh-btn svg,
    #settings-btn svg { width: 100%; height: 100%; display: block; }
    #refresh-btn:hover,
    #settings-btn:hover { color: var(--text); }
    #refresh-btn:active { transform: rotate(60deg); transition: transform 0.2s; }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.82rem;
    }
    .settings-choice {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .settings-choice button {
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 0.35rem 0.65rem;
      cursor: pointer;
    }
    .settings-choice button:last-child { border-right: none; }
    .settings-choice button.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    #world-lv-display span {
      color: var(--text);
      font-weight: bold;
    }

    .tab-btn {
      position: relative;
      flex: 1;
      padding: 0.6rem 0.5rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.15s, border-top 0.15s;
      border-top: 2px solid transparent;
    }

    /* 通知ドット(共通) */
    .notify-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 4px var(--accent);
      animation: notify-pulse 1.6s ease-in-out infinite;
    }
    @keyframes notify-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }
    .story-item-title .notify-dot { margin-right: 0.4rem; vertical-align: middle; }

    .tab-badge {
      position: absolute;
      top: 7px;
      left: 50%;
      margin-left: 0.55rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 4px var(--accent);
      animation: notify-pulse 1.6s ease-in-out infinite;
    }
    .tab-badge[hidden] { display: none; }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-top-color: var(--accent);
    }

    .tab-btn--dev { color: #4a6a4a; }
    .tab-btn--dev:hover { color: #7aaa7a; }
    .tab-btn--dev.active { color: #7aaa7a; border-top-color: #7aaa7a; }

    /* ── 開発メニュー ── */
    .dev-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }

    .dev-label { font-size: 0.82rem; color: var(--muted); }
    .dev-label-sub { font-size: 0.72rem; }
    .dev-btn--on { background: #1a3a1a; color: #7aaa7a; border-color: #2a6a2a; }

    .dev-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .dev-btn--danger {
      background: #3a1a1a;
      color: #c07070;
      border: 1px solid #6a2a2a;
    }

    .dev-btn--danger:hover { background: #501a1a; }

    .dev-select {
      font-size: 0.75rem;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }

    /* ── 同行タブ ── */
    .party-section {
      margin-bottom: 0.75rem;
    }
    .party-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      padding-left: 0.2rem;
    }
    .party-section--board {
      position: relative;
    }
    .companion-board {
      position: relative;
      height: 17rem;
      margin: 0.4rem 0 0.65rem;
      overflow: hidden;
      border: 1px solid rgba(116, 151, 196, 0.22);
      border-radius: 14px;
      background:
        radial-gradient(circle at 50% 48%, rgba(42, 58, 86, 0.32), transparent 24%),
        radial-gradient(circle at 24% 24%, rgba(126, 168, 224, 0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 76% 70%, rgba(180, 205, 238, 0.08) 0 1px, transparent 2px),
        rgba(5, 8, 15, 0.48);
    }
    .companion-board-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 13.5rem;
      height: 8.4rem;
      border: 1px solid rgba(126, 168, 224, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%) rotate(-12deg);
      box-shadow: 0 0 24px rgba(90, 130, 190, 0.05);
    }
    .companion-board-link {
      position: absolute;
      left: 24%;
      right: 24%;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(126, 168, 224, 0.2), transparent);
      transform: rotate(-12deg);
      transform-origin: center;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .companion-board--linked .companion-board-link {
      background: linear-gradient(90deg, transparent, rgba(137, 180, 250, 0.78), transparent);
      box-shadow: 0 0 8px rgba(137, 180, 250, 0.45);
    }
    .companion-board-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3.2rem;

  (function () {
    var splash = document.getElementById('splash-screen');
    function dismiss() {
      splash.classList.add('hidden');
      splash.removeEventListener('click', dismiss);
      window.dispatchEvent(new Event('splash-dismissed'));
      setTimeout(function () { splash.remove(); }, 500);
    }
    splash.addEventListener('click', dismiss);
  })();

<script>
  const sidePanelWrap = document.getElementById('main-panel-wrap');
  const sidePanels = [...document.querySelectorAll('.side-panel')];
  function syncSidePanelState() {
    sidePanelWrap.classList.toggle('side-panel-open', sidePanels.some(panel => panel.classList.contains('open')));
  }
  for (const panel of sidePanels) {
    const tab = panel.querySelector('.side-panel-tab');
    tab.addEventListener('click', () => {
      const willOpen = !panel.classList.contains('open');
      for (const other of sidePanels) other.classList.remove('open');
      panel.classList.toggle('open', willOpen);
      syncSidePanelState();
    });
  }
  document.addEventListener('click', (e) => {
    const openPanel = sidePanels.find(panel => panel.classList.contains('open'));
    // パネル内の操作で中身が再描画され、クリック元がDOMから外れても閉じない。
    // contains(e.target) ではなく、クリック時点の伝播経路で内外を判定する。
    if (openPanel && !e.composedPath().includes(openPanel)) {
      openPanel.classList.remove('open');
      syncSidePanelState();
    }
  });

  const resizer = document.getElementById('resizer');
  const mainPanel = document.getElementById('main-panel');
  const mainPanelWrap = document.getElementById('main-panel-wrap');
  const MIN_H = 60;

  let startY = 0;
  let startH = 0;

  function onMove(y) {
    const appH = document.getElementById('app').clientHeight;
    const newH = Math.max(MIN_H, Math.min(startH + (y - startY), appH - MIN_H - 120));
    mainPanelWrap.style.height = newH + 'px';
    mainPanel.scrollTop = mainPanel.scrollHeight;
  }

  resizer.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = mainPanelWrap.getBoundingClientRect().height;
    resizer.classList.add('dragging');
    document.body.style.userSelect = 'none';

    const onMouseMove = e => onMove(e.clientY);
    const onMouseUp = () => {
      resizer.classList.remove('dragging');
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
  });

  resizer.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startH = mainPanelWrap.getBoundingClientRect().height;
    resizer.classList.add('dragging');

    const onTouchMove = e => { e.preventDefault(); onMove(e.touches[0].clientY); };
    const onTouchEnd = () => {
      resizer.classList.remove('dragging');
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
    };
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd);
  });

  // 初期高さを画面の約45%に設定
  mainPanelWrap.style.height = (document.getElementById('app').clientHeight * 0.45) + 'px';

  document.getElementById('dev-reset-btn').addEventListener('click', () => {
    if (!confirm('セーブデータをすべて削除してリセットしますか？')) return;
    localStorage.removeItem('fr_save_v1');
    location.reload();
  });
</script>
