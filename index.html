<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fragment Recollection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --panel: #161826;
      --border: #2a2d42;
      --text: #d4cfc7;
      --muted: #6e6a7c;
      --accent: #a89fc8;
      --accent-dim: #3b3060;
      --accent-border: #5a4d8a;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* ── アプリ全体のシェル ── */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100svh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── メインパネル(ログ) ── */
    #main-panel {
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* ── リサイザー ── */
    #resizer {
      height: 8px;
      cursor: ns-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }

    #resizer::after {
      content: '';
      display: block;
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
    }

    #resizer:hover::after,
    #resizer.dragging::after {
      background: var(--accent);
    }

    .log-entry {
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--muted);
      border-left: 2px solid var(--border);
      padding-left: 0.6rem;
    }

    .log-entry.highlight {
      color: var(--text);
      border-left-color: var(--accent);
    }

    /* ── アクション行 ── */
    #action-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    #action-picker-btn {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.45rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #action-picker-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #action-picker-btn::after { content: '▾'; color: var(--muted); font-size: 0.75rem; }

    /* ── 行動ビュー ── */
    .action-card {
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
    }

    .action-card:last-child { border-bottom: none; }
    .action-card:hover { background: #1a1c2e; margin: 0 -1rem; padding: 0.65rem 1rem; }
    .action-card.selected { background: #1e1a30; margin: 0 -1rem; padding: 0.65rem 1rem; }

    .action-card-info { flex: 1; }
    .action-card-name { font-size: 0.88rem; color: var(--text); }
    .action-card-desc { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
    .action-card-meta { font-size: 0.7rem; color: var(--muted); white-space: nowrap; text-align: right; }
    .action-card.selected .action-card-name { color: var(--accent); }

    .action-group { margin-bottom: 0.75rem; }
    .action-group-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.1rem;
    }

    #action-btn {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    #action-btn:hover:not(:disabled) { background: #4d3f7a; }
    #action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* プログレスバーはアクション行の下に */
    #progress-wrap {
      height: 3px;
      background: var(--panel);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }

    /* ── サブパネル ── */
    #sub-panel {
      overflow-y: auto;
      padding: 1rem;
      flex: 1;
      min-height: 80px;
    }

    .sub-view { display: none; }
    .sub-view.active { display: block; }

    .sub-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .resource-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .resource-row:last-child { border-bottom: none; }

    .resource-name { color: var(--muted); }
    .resource-val {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-size: 1rem;
    }

    .placeholder {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      margin-top: 2rem;
    }

    /* ── ヘッダー ── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 1rem;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    #header-title {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    /* ── 物語ビュー(サブパネル内) ── */
    .story-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }

    .story-item:last-child { border-bottom: none; }

    .story-item-title {
      font-size: 0.88rem;
      color: var(--text);
      flex: 1;
    }

    .story-item-title.locked { color: var(--muted); }

    .story-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
      transition: background 0.15s, opacity 0.15s;
    }

    .story-btn:hover { background: #4d3f7a; }
    .story-btn.locked {
      background: none;
      color: var(--muted);
      border-color: var(--border);
    }
    .story-btn.locked:hover { background: #1e2030; }

    .story-cost {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── 物語ポップアップオーバーレイ ── */
    #story-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #story-overlay.open { display: flex; }

    #story-viewer {
      width: 100%;
      max-width: 480px;
      max-height: 85svh;
      background: #12141f;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
    }

    #story-viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem 0.7rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #story-viewer-title {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    #story-close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
    }

    #story-close-btn:hover { color: var(--text); }

    #story-body {
      overflow-y: auto;
      padding: 1.5rem 1.25rem 2rem;
      font-size: 0.9rem;
      line-height: 1.2;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .story-page { white-space: pre-wrap; }

    .story-sep {
      height: 1h; /* ページ間に本文1行分の空白 */
    }

    .story-next-btn {
      align-self: center;
      margin-top: 0.5rem;
      padding: 0.5rem 1.25rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .story-next-btn:hover { background: #4d3f7a; }

    .story-fin {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 0.5rem;
    }

    /* ── チュートリアルオーバーレイ ── */
    #tutorial-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    #tutorial-overlay.open { display: flex; }

    #tutorial-box {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem 5rem;
      color: var(--text);
    }

    #tutorial-text {
      font-size: 0.95rem;
      line-height: 2;
      white-space: pre-wrap;
      text-align: center;
      min-height: 6rem;
    }

    #tutorial-indicator {
      position: absolute;
      bottom: 1rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: var(--accent);
      animation: blink 1s step-start infinite;
    }

    #tutorial-btn[hidden],
    #tutorial-indicator[hidden] { display: none; }

    #tutorial-btn {
      display: block;
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 2rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #tutorial-btn:hover { background: #4d3f7a; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── アクションバー ガイド ── */
    #action-guide {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13,15,26,0.95);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      padding: 0.7rem 1.2rem;
      font-size: 0.82rem;
      color: var(--accent);
      pointer-events: auto;
      z-index: 150;
      white-space: nowrap;
      animation: fadeIn 0.3s ease;
    }

    #action-guide.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -55%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    /* ── ストーリーログ(メインパネル内) ── */
    .story-log {
      text-align: center;
      color: var(--text);
      font-size: 0.88rem;
      line-height: 1.9;
      border-left: none !important;
      padding-left: 0 !important;
    }

    .story-tap-indicator {
      text-align: center;
      color: var(--accent);
      font-size: 0.75rem;
      animation: blink 0.9s step-start infinite;
    }

    .story-name-prompt {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .story-name-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .story-name-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 0.3rem 0.6rem;
      font-size: 0.9rem;
      width: 140px;
      text-align: center;
    }

    .story-name-row button {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .story-end-btn {
      margin-top: 0.5rem;
      padding: 0.45rem 1.5rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .story-end-btn:hover { background: #4d3f7a; }
    .story-end-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── フッタータブ ── */
    #footer {
      display: flex;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    .tab-btn {
      flex: 1;
      padding: 0.65rem 0.5rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.15s, border-top 0.15s;
      border-top: 2px solid transparent;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-top-color: var(--accent);
    }

    .tab-btn--dev { color: #4a6a4a; }
    .tab-btn--dev:hover { color: #7aaa7a; }
    .tab-btn--dev.active { color: #7aaa7a; border-top-color: #7aaa7a; }

    /* ── 開発メニュー ── */
    .dev-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }

    .dev-label { font-size: 0.82rem; color: var(--muted); }
    .dev-label-sub { font-size: 0.72rem; }
    .dev-btn--on { background: #1a3a1a; color: #7aaa7a; border-color: #2a6a2a; }

    .dev-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .dev-btn--danger {
      background: #3a1a1a;
      color: #c07070;
      border: 1px solid #6a2a2a;
    }

    .dev-btn--danger:hover { background: #501a1a; }

    /* ── 同行タブ ── */
    .party-section {
      margin-bottom: 1.25rem;
    }
    .party-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      padding-left: 0.2rem;
    }
    .party-empty {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.5rem 0.2rem;
    }
    .party-bonus {
      font-size: 0.78rem;
      color: #7ec88a;
      margin-top: 0.4rem;
      padding-left: 0.2rem;
    }
    .companion-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.5rem;
      background: var(--panel);
    }
    .companion-card--fixed {
      opacity: 0.6;
    }
    .companion-card--active {
      border-color: var(--accent-border);
    }
    .companion-card > div:first-child {
      flex: 1;
    }
    .companion-name {
      font-size: 0.92rem;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }
    .companion-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .companion-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.65rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text);
    }
    .companion-btn--add {
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .companion-btn--add:hover { background: var(--accent-dim); }
    .companion-btn--remove {
      border-color: #5a3030;
      color: #c08080;
    }
    .companion-btn--remove:hover { background: #3a1a1a; }

    /* ── ボーナス報酬表記 ── */
    .log-bonus {
      color: #7ec88a;
    }

    /* ── タブ点滅（新解放通知） ── */
    @keyframes tab-notify {
      0%, 100% { color: var(--text); }
      50% { color: var(--accent); }
    }
    .tab-btn--notify {
      animation: tab-notify 0.8s ease-in-out infinite;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- ヘッダー -->
  <div id="header">
    <span id="header-title">Fragment Recollection</span>
  </div>

  <!-- メインパネル(ログ) -->
  <div id="main-panel">
    <div class="log-entry highlight">Fragment Recollection を開始しました。</div>
  </div>

  <!-- アクション行 -->
  <div>
    <div id="action-bar">
      <button id="action-picker-btn">探索</button>
      <button id="action-btn">開始</button>
    </div>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- リサイザー -->
  <div id="resizer"></div>

  <!-- サブパネル -->
  <div id="sub-panel">
    <div id="view-items" class="sub-view active">
      <div class="sub-title">持ち物</div>
      <div id="resource-list"></div>
    </div>
    <div id="view-stories" class="sub-view">
      <div class="sub-title">物語</div>
      <div id="story-list"></div>
    </div>
    <div id="view-chars" class="sub-view">
      <div class="sub-title">同行</div>
      <div class="placeholder">準備中</div>
    </div>
    <div id="view-actions" class="sub-view">
      <div class="sub-title">行動を選択</div>
      <div id="action-list"></div>
    </div>
    <div id="view-dev" class="sub-view">
      <div class="sub-title">開発メニュー</div>
      <div class="dev-row">
        <span class="dev-label">開発モード<br><span class="dev-label-sub" id="dev-mode-desc">OFF — 通常動作</span></span>
        <button id="dev-mode-btn" class="dev-btn">OFF</button>
      </div>
      <div id="dev-tools" style="display:none">
        <div class="dev-row">
          <span class="dev-label">フラグメント追加</span>
          <div style="display:flex;gap:0.4rem">
            <button class="dev-btn" data-add-resource="fragment" data-add-amount="10">+10</button>
            <button class="dev-btn" data-add-resource="fragment" data-add-amount="100">+100</button>
          </div>
        </div>
        <div class="dev-row">
          <span class="dev-label">物語</span>
          <div style="display:flex;gap:0.4rem">
            <button class="dev-btn" id="dev-unlock-all-stories">全解放</button>
            <button class="dev-btn dev-btn--danger" id="dev-lock-all-stories">全ロック</button>
          </div>
        </div>
      </div>
      <div class="dev-row">
        <span class="dev-label">チュートリアル</span>
        <button id="dev-tutorial-btn" class="dev-btn">開始</button>
      </div>
      <div class="dev-row">
        <span class="dev-label">セーブデータをすべて削除してリロード</span>
        <button id="dev-reset-btn" class="dev-btn dev-btn--danger">リセット</button>
      </div>
    </div>
  </div>

  <!-- チュートリアルオーバーレイ -->
  <div id="tutorial-overlay">
    <div id="tutorial-box">
      <div id="tutorial-text"></div>
      <div id="tutorial-indicator" hidden>▽</div>
      <button id="tutorial-btn" hidden></button>
    </div>
  </div>

  <!-- アクションガイド -->
  <div id="action-guide">〈ここから行動できます〉</div>

  <!-- 物語ポップアップ -->
  <div id="story-overlay">
    <div id="story-viewer">
      <div id="story-viewer-header">
        <span id="story-viewer-title"></span>
        <button id="story-close-btn">✕</button>
      </div>
      <div id="story-body"></div>
    </div>
  </div>

  <!-- フッター -->
  <div id="footer">
    <button class="tab-btn" data-view="view-stories">物語</button>
    <button class="tab-btn active" data-view="view-items">持ち物</button>
    <button class="tab-btn" data-view="view-chars">同行</button>
    <button class="tab-btn tab-btn--dev" data-view="view-dev">開発</button>
  </div>
</div>

<script type="module">
  import { ACTIONS, getState, subscribe, startAction, getProgress } from './game.js';
  import { init } from './ui.js';
  init();
</script>
<script>
  const resizer = document.getElementById('resizer');
  const mainPanel = document.getElementById('main-panel');
  const MIN_H = 60;

  let startY = 0;
  let startH = 0;

  function onMove(y) {
    const appH = document.getElementById('app').clientHeight;
    const newH = Math.max(MIN_H, Math.min(startH + (y - startY), appH - MIN_H - 120));
    mainPanel.style.height = newH + 'px';
  }

  resizer.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = mainPanel.getBoundingClientRect().height;
    resizer.classList.add('dragging');
    document.body.style.userSelect = 'none';

    const onMouseMove = e => onMove(e.clientY);
    const onMouseUp = () => {
      resizer.classList.remove('dragging');
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
  });

  resizer.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startH = mainPanel.getBoundingClientRect().height;
    resizer.classList.add('dragging');

    const onTouchMove = e => { e.preventDefault(); onMove(e.touches[0].clientY); };
    const onTouchEnd = () => {
      resizer.classList.remove('dragging');
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
    };
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd);
  });

  // 初期高さを画面の約45%に設定
  mainPanel.style.height = (document.getElementById('app').clientHeight * 0.45) + 'px';

  document.getElementById('dev-reset-btn').addEventListener('click', () => {
    if (!confirm('セーブデータをすべて削除してリセットしますか？')) return;
    localStorage.setItem('fr_save_v1', JSON.stringify({
      resources: { fragment: 1000 },
      activeAction: null,
      unlockedStories: [],
      storyProgress: {},
    }));
    location.reload();
  });
</script>
</body>
</html>
