<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fragment Recollection</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'KoburiMincho';
      src: url('font/小ぶり明朝.ttf') format('truetype');
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── スクロールバー ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-dim);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-border); }

    :root {
      --bg: #0d0f1a;
      --panel: #161826;
      --border: #2a2d42;
      --text: #d4cfc7;
      --muted: #6e6a7c;
      --accent: #1e90ff;
      --accent-dim: #333366;
      --accent-border: #5a4d8a;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* ── アプリ全体のシェル ── */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100svh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    /* ── メインパネル(ログ) ── */
    #main-panel-wrap {
      position: relative;
      flex-shrink: 0;
    }
    #main-panel {
      overflow-y: auto;
      padding: 0.6rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      height: 100%;
    }

    /* ── 導きパネル(スライドオーバーレイ) ── */
    #guide-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 82%;
      max-width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      box-shadow: -6px 0 16px rgba(0,0,0,0.4);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 5;
      display: flex;
      flex-direction: column;
    }
    #guide-panel.open { transform: translateX(0); }
    #guide-panel.hidden { display: none; }
    #guide-panel-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.7rem;
      gap: 0.5rem;
      overflow-y: auto;
    }
    #guide-tab-btn {
      position: absolute;
      top: 14px;
      left: -28px;
      width: 28px;
      height: 64px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: var(--text);
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
      cursor: pointer;
    }
    #guide-panel-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
    }

    /* ── リサイザー ── */
    #resizer {
      height: 8px;
      cursor: ns-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }

    #resizer::after {
      content: '';
      display: block;
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
    }

    #resizer:hover::after,
    #resizer.dragging::after {
      background: var(--accent);
    }

    .log-entry {
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--muted);
      border-left: 2px solid var(--border);
      padding-left: 0.6rem;
    }

    .log-entry.highlight {
      color: var(--text);
      border-left-color: var(--accent);
    }

    /* ── アクション行 ── */
    #action-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    #action-picker-btn {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #action-picker-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #action-picker-btn::after { content: '▾'; color: var(--muted); font-size: 0.75rem; }

    /* ── 行動ビュー ── */
    /* ── 行動メニュー ── */
    .action-section { margin-bottom: 0.5rem; }

    .action-place-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
      cursor: pointer;
      user-select: none;
    }
    .action-place-toggle {
      font-size: 9px;
      color: var(--muted);
      transition: transform 0.2s;
      display: inline-block;
      opacity: 0.5;
    }
    .action-section.open .action-place-toggle { transform: rotate(90deg); }
    .action-place-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .action-rows {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
      padding-left: 6px;
    }
    .action-section.open .action-rows {
      max-height: 600px;
      margin-top: 4px;
    }

    .action-row {
      display: flex;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .action-row:last-child { border-bottom: none; }
    .action-row:hover { background: var(--accent-dim); }
    .action-row.selected { background: var(--accent-dim); border-left: 2px solid var(--accent); padding-left: 6px; }
    .action-row.running { opacity: 0.6; }

    .action-row-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      min-width: 3em;
    }
    .action-row-desc {
      font-size: 0.72rem;
      color: var(--muted);
      flex: 1;
    }
    .action-row-time {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .action-play-btn-unused {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid var(--accent-border);
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 2px;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-play-btn:hover { background: var(--accent-dim); }
    .action-play-btn.running {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    #action-btn {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    #action-btn:hover:not(:disabled) { background: #4d3f7a; }
    #action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* プログレスバーはメインパネルの下端 */
    #progress-wrap {
      height: 3px;
      background: var(--panel);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }

    /* ── サブパネル ── */
    #sub-panel {
      overflow-y: auto;
      padding: 0.6rem 0.75rem;
      flex: 1;
      min-height: 80px;
    }

    .sub-view { display: none; }
    .sub-view.active { display: block; }

    .sub-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .resource-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.2rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .resource-row:last-child { border-bottom: none; }

    .resource-name { color: var(--muted); }
    .resource-val {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-size: 1rem;
    }

    .placeholder {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      margin-top: 2rem;
    }

    /* ── ヘッダー ── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 1rem;
      height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    #header-title {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    /* ── 物語ビュー(サブパネル内) ── */
    .story-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }

    .story-item:last-child { border-bottom: none; }
    .story-item.unlocked:hover { background: rgba(255,255,255,0.03); }

    .story-item-title {
      font-size: 0.88rem;
      color: var(--text);
      flex: 1;
    }

    .story-item-title.locked { color: var(--muted); }

    .story-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
      transition: background 0.15s, opacity 0.15s;
    }

    .story-btn:hover { background: #4d3f7a; }
    .story-btn.locked {
      background: none;
      color: var(--muted);
      border-color: var(--border);
    }
    .story-btn.locked:hover { background: #1e2030; }

    .story-open-btn {
      flex-shrink: 0;
      font-size: 0.85rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
    }
    .story-open-btn:hover { background: var(--accent-dim); }

    .story-cost {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── 物語ポップアップオーバーレイ ── */
    #story-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #story-overlay.open { display: flex; }

    #story-viewer {
      position: relative;
      width: 100%;
      max-width: 480px;
      height:75svh;
      background: #12141f;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
    }

    #story-viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem 0.7rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #story-viewer-title {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      transition: opacity 1s;
    }

    #story-close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
    }

    #story-close-btn:hover { color: var(--text); }

    #story-body {
      overflow-y: auto;
      flex: 1;
      padding: 1.5rem 1.25rem 2rem;
      font-size: 0.9rem;
      line-height: 1.2;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @keyframes story-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .story-page {
      white-space: pre-wrap;
      font-family: 'KoburiMincho', 'Shippori Mincho', serif;
      margin-bottom: 0.5lh;
    }

    .story-page-new {
      animation: story-fadein 1.2s ease both;
    }

    

    .story-next-btn {
      align-self: center;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .story-next-btn:hover { background: #4d3f7a; }

    .memory-cost-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .memory-ring {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      transform: rotate(-90deg);
    }
    .memory-ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
    }
    .memory-ring-fill {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease, stroke 0.4s ease;
    }
    .memory-cost-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.1rem;
    }
    .memory-resource-name {
      font-size: 0.75rem;
      color: var(--text);
    }
    .memory-counts {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .memory-cost-item.enough .memory-counts {
      color: var(--accent);
    }


    #viewer-toast {
      position: absolute;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 35, 0.92);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 0.45rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #viewer-toast.visible { opacity: 1; }

    #story-fin-bar {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      padding: 0.75rem 0;
      user-select: none;
    }
    #story-fin-bar:empty { display: none; }

    .story-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      width: 100%;
    }
    .story-nav-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem 0.5rem;
      opacity: 0.7;
    }
    .story-nav-btn:disabled { opacity: 0.2; cursor: default; }
    .story-nav-btn:not(:disabled):hover { opacity: 1; }
    @keyframes nav-blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .story-nav-btn--blink {
      animation: nav-blink 0.6s ease-in-out 3;
    }
    .story-nav-info {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
    }

    /* ── チュートリアルオーバーレイ ── */
    #tutorial-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    #tutorial-overlay.open { display: flex; }

    #tutorial-box {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem 5rem;
      color: var(--text);
    }

    #tutorial-text {
      font-size: 0.95rem;
      line-height: 2;
      white-space: pre-wrap;
      text-align: center;
      min-height: 6rem;
    }

    #tutorial-indicator {
      position: absolute;
      bottom: 1rem;
      right: 1.5rem;
      font-size: 0.85rem;
      color: var(--accent);
      animation: blink 1s step-start infinite;
    }

    #tutorial-btn[hidden],
    #tutorial-indicator[hidden] { display: none; }

    #tutorial-btn {
      display: block;
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 2rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #tutorial-btn:hover { background: #4d3f7a; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── アクションバー ガイド ── */
    #action-guide-wrap {
      position: relative;
      height: 0;
      overflow: visible;
      pointer-events: none;
    }
    #action-guide {
      left: 50%;
    }

    /* ── ストーリーログ(メインパネル内) ── */
    .story-log {
      text-align: center;
      color: var(--text);
      font-size: 0.88rem;
      line-height: 1.9;
      border-left: none !important;
      padding-left: 0 !important;
    }

    .story-tap-indicator {
      text-align: center;
      color: var(--accent);
      font-size: 0.75rem;
      animation: blink 0.9s step-start infinite;
    }

    .story-name-prompt {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .story-name-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .story-name-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 0.3rem 0.6rem;
      font-size: 0.9rem;
      width: 140px;
      text-align: center;
    }

    .story-name-row button {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .story-end-btn {
      margin-top: 0.5rem;
      padding: 0.45rem 1.5rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .story-end-btn:hover { background: #4d3f7a; }
    .story-end-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── フッタータブ ── */
    #footer {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    /* ── 場所詳細ポップアップ ── */
    .location-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }
    .location-popup.open { display: block; }
    .equip-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }
    .equip-popup.open { display: flex; }
    .equip-popup-inner {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      min-width: 200px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .equip-popup-title {
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .equip-popup-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .equip-popup-item {
      text-align: left;
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }
    .equip-popup-item:hover { background: var(--accent-dim); }
    .companion-equip-btn {
      font-size: 0.78rem;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      align-self: flex-start;
    }
    .companion-equip-btn:hover { background: var(--accent-dim); }
    .location-popup-inner {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      max-width: 240px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .location-popup-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .location-popup-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .location-popup-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .location-popup-lv {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .location-popup-lvup-btn {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 0.6rem 0.5rem;
      font-size: 0.8rem;
      font-family: inherit;
      border-radius: 5px;
      border: 1px solid var(--accent-border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      text-align: left;

      touch-action: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .lvup-progress {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: var(--accent);
      opacity: 0.2;
      pointer-events: none;
      transition: none;
    }
    .location-popup-lvup-btn.ready {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .location-popup-lvup-btn.ready .lvup-btn-cost,
    .location-popup-lvup-btn.ready .lvup-btn-ratio {
      color: #fff;
    }
    .location-popup-lvup-btn.ready .lvup-progress { display: none; }
    .location-popup-lvup-btn:disabled {
      cursor: not-allowed;
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .lvup-btn-label { flex: 1; }
    .lvup-btn-cost {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .lvup-btn-ratio { color: var(--muted); }
    .lvup-have-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: right;
      margin-bottom: 0.25rem;
    }

    .location-info-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: opacity 0.15s;
      flex-shrink: 0;
      opacity: 0.7;
      filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(190deg) brightness(1.4);
    }
    .location-info-btn:hover { opacity: 1; }
    .location-info-btn img { width: 14px; height: 14px; display: block; }

    #world-lv-display {
      margin-left: auto;
      padding: 0 0.8rem;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    #world-lv-display span {

      font-weight: bold;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem 0.5rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;

      transition: color 0.15s, border-top 0.15s;
      border-top: 2px solid transparent;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {

    }

    .tab-btn--dev:hover { color: #7aaa7a; }
    .tab-btn--dev.active { color: #7aaa7a; border-top-color: #7aaa7a; }

    /* ── 開発メニュー ── */
    .dev-row {
      display: flex;
      justify-content: space-between;
      align-items: center;

    }

      padding: 0.3rem 0.5rem;
      border-radius: 4px;

      color: var(--text);
      cursor: pointer;
    }

    /* ── 同行タブ ── */
    .party-section {
      margin-bottom: 0.75rem;
    }
    .party-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;

      margin-bottom: 0.3rem;
      padding-left: 0.2rem;
    }
    .party-empty {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.3rem 0.2rem;
    }
    .party-bonus {
      font-size: 0.78rem;
      color: #7ec88a;
      margin-top: 0.25rem;
      padding-left: 0.2rem;
      line-height: 1.5;
    }
    .party-bonus-extra {
      color: #89b4fa;
    }
    .party-bonus-sep {
      color: var(--muted);
    }
    .companion-card {

      align-items: center;

    .companion-card--fixed {
      opacity: 0.6;
      cursor: default;
    }
    .companion-detail {
      margin: -0.3rem 0 0.3rem;
      padding: 0.6rem 0.7rem;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;

      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .companion-detail-label {
      font-size: 0.72rem;
      color: var(--accent);
      margin-bottom: 0.15rem;
    }
    .companion-detail-body {
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.5;
    }
    .companion-memory-line {
      font-size: 0.78rem;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .companion-card--active {
      border-color: var(--accent-border);
    }
    .companion-card > div:first-child {
      flex: 1;
    }
    .companion-name {
      font-size: 0.92rem;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }
    .companion-lv {
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 0.4rem;
    }
    .companion-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .companion-btn {
      flex-shrink: 0;
      font-size: 0.75rem;
      padding: 0.3rem 0.65rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text);
    }
    .companion-btn--add {
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .companion-btn--add:hover { background: var(--accent-dim); }
    .companion-btn--remove {
      border-color: #5a3030;
      color: #c08080;
    }
    .companion-btn--remove:hover { background: #3a1a1a; }

    /* ── ログ内アイテム名 ── */
    .log-resource {
      color: #7ec8d8;
      font-weight: bold;
    }

    /* ── ボーナス報酬表記 ── */
    .log-bonus {
      color: #7ec88a;
    }

    /* ── 同行者固有報酬 ── */
    .log-resource-blue {
      color: #89b4fa;
      font-weight: bold;
    }
    .log-companion-reward {
      color: #a6adc8;
    }

    /* ── タブトースト ── */
    #tab-toast {
      position: relative;
      height: 0;
      overflow: visible;
      pointer-events: none;
    }
    .toast-bubble {
      position: absolute;
      bottom: 0.5rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-size: 0.78rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast-bubble::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--accent-border);
      border-bottom: none;
    }
    .toast-bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
<div id="app">
  <!-- ヘッダー -->
  <div id="header">
    <span id="header-title">Fragment Recollection</span>
    <div id="world-lv-display">worldLv <span id="world-lv-value">0</span></div>
  </div>

  <!-- メインパネル(ログ) -->
  <div id="main-panel-wrap">
    <div id="main-panel">
      <div class="log-entry highlight">世界を再生しました</div>
    </div>
    <div id="guide-panel" class="hidden">
      <button id="guide-tab-btn">導き</button>
      <div id="guide-panel-inner">
        <div id="guide-panel-header">導き</div>
        <div id="guide-list"></div>
      </div>
    </div>
  </div>

  <!-- アクション行 -->
  <div>
    <!-- プログレスバー -->
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <!-- アクションガイド -->
    <div id="action-guide-wrap">
      <div id="action-guide" class="toast-bubble">〈ここから行動できます〉</div>
    </div>
    <div id="action-bar">
      <button id="action-picker-btn">探索</button>
      <button id="action-btn">開始</button>
    </div>
  </div>

  <!-- リサイザー -->
  <div id="resizer"></div>

  <!-- サブパネル -->
  <div id="sub-panel">
    <div id="view-items" class="sub-view active">
      <div class="sub-title">持ち物</div>
      <div id="resource-list"></div>
    </div>
    <div id="view-stories" class="sub-view">
      <div class="sub-title">記憶</div>
      <div id="story-list"></div>
    </div>
    <div id="view-chars" class="sub-view">
      <div class="sub-title">同行</div>
      <div class="placeholder">準備中</div>
    </div>
    <div id="view-actions" class="sub-view">
      <div class="sub-title">行動を選択</div>
      <div id="action-list"></div>
    </div>
    <div id="view-dev" class="sub-view">
      <div class="sub-title">開発メニュー</div>
      <div class="dev-row">
        <span class="dev-label">高速モード<br><span class="dev-label-sub" id="dev-mode-desc">OFF — 通常速度</span></span>
        <button id="dev-mode-btn" class="dev-btn">OFF</button>
      </div>
      <div id="dev-tools">
        <div class="dev-row">
          <span class="dev-label">自動再開</span>
          <button id="dev-auto-restart-btn" class="dev-btn">OFF</button>
        </div>
        <div class="dev-row">
          <span class="dev-label">フラグメント追加</span>
          <div style="display:flex;gap:0.4rem">
            <button class="dev-btn" data-add-resource="fragment" data-add-amount="10">+10</button>
            <button class="dev-btn" data-add-resource="fragment" data-add-amount="100">+100</button>
          </div>
        </div>
        <div class="dev-row">
          <span class="dev-label">物語</span>
          <div style="display:flex;gap:0.4rem">
            <button class="dev-btn" id="dev-unlock-all-stories">全解放</button>
            <button class="dev-btn dev-btn--danger" id="dev-lock-all-stories">全ロック</button>
          </div>
        </div>
        <div class="dev-row">
          <span class="dev-label">行動</span>
          <div style="display:flex;gap:0.4rem">
            <button class="dev-btn" id="dev-unlock-all-actions">全解放</button>
            <button class="dev-btn dev-btn--danger" id="dev-lock-all-actions">全ロック</button>
          </div>
        </div>
        <div class="dev-row">
          <span class="dev-label">キャラクター</span>
          <button class="dev-btn" id="dev-unlock-all-companions">全解放</button>
        </div>
        <div class="dev-row">
          <span class="dev-label">ログストーリー</span>
          <select class="dev-select" id="dev-log-story-select">
            <option value="">— 選択 —</option>
            <option value="1">001</option>
            <option value="2">002</option>
            <option value="3">003</option>
            <option value="4">004</option>
          </select>
        </div>
      </div>
      <div class="dev-row">
        <span class="dev-label">セーブデータをすべて削除してリロード</span>
        <button id="dev-reset-btn" class="dev-btn dev-btn--danger">リセット</button>
      </div>
    </div>
  </div>

  <!-- チュートリアルオーバーレイ -->
  <div id="tutorial-overlay">
    <div id="tutorial-box">
      <div id="tutorial-text"></div>
      <div id="tutorial-indicator" hidden>▽</div>
      <button id="tutorial-btn" hidden></button>
    </div>
  </div>

  <!-- 物語ポップアップ -->
  <div id="story-overlay">
    <div id="story-viewer">
      <div id="story-viewer-header">
        <span id="story-viewer-title"></span>
        <button id="story-close-btn">✕</button>
      </div>
      <div id="story-body"></div>
      <div id="story-fin-bar"></div>
    </div>
  </div>

  <!-- タブトースト -->
  <div id="tab-toast"></div>

  <!-- 場所詳細ポップアップ -->
  <div id="location-popup" class="location-popup">
    <div class="location-popup-inner">
      <div class="location-popup-header">
        <div class="location-popup-name" id="location-popup-name"></div>
        <div class="location-popup-lv" id="location-popup-lv"></div>
      </div>
      <div class="location-popup-desc" id="location-popup-desc"></div>
      <div class="lvup-have-label" id="location-popup-lvup-have"></div>
      <button class="location-popup-lvup-btn" id="location-popup-lvup-btn"></button>
    </div>
  </div>

  <!-- 持ち物選択ポップアップ -->
  <div id="equip-popup" class="equip-popup">
    <div class="equip-popup-inner">
      <div class="equip-popup-title">持ち物を選択</div>
      <div id="equip-popup-list" class="equip-popup-list"></div>
    </div>
  </div>

  <!-- フッター -->
  <div id="footer">
    <button class="tab-btn" data-view="view-stories">記憶</button>
    <button class="tab-btn" data-view="view-actions">地図</button>
    <button class="tab-btn active" data-view="view-items">持ち物</button>
    <button class="tab-btn" data-view="view-chars">同行</button>
    <button class="tab-btn tab-btn--dev" data-view="view-dev">開発</button>
  </div>
</div>

<script type="module">
  import { ACTIONS, getState, subscribe, startAction, getProgress } from './game.js';
  import { init } from './ui.js';
  init();
</script>
<script>
  const guidePanel = document.getElementById('guide-panel');
  const guideTabBtn = document.getElementById('guide-tab-btn');
  guideTabBtn.addEventListener('click', () => {
    guidePanel.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (guidePanel.classList.contains('open') && !guidePanel.contains(e.target)) {
      guidePanel.classList.remove('open');
    }
  });

  const resizer = document.getElementById('resizer');
  const mainPanel = document.getElementById('main-panel');
  const mainPanelWrap = document.getElementById('main-panel-wrap');
  const MIN_H = 60;

  let startY = 0;
  let startH = 0;

  function onMove(y) {
    const appH = document.getElementById('app').clientHeight;
    const newH = Math.max(MIN_H, Math.min(startH + (y - startY), appH - MIN_H - 120));
    mainPanelWrap.style.height = newH + 'px';
    mainPanel.scrollTop = mainPanel.scrollHeight;
  }

  resizer.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = mainPanelWrap.getBoundingClientRect().height;
    resizer.classList.add('dragging');
    document.body.style.userSelect = 'none';

    const onMouseMove = e => onMove(e.clientY);
    const onMouseUp = () => {
      resizer.classList.remove('dragging');
      document.body.style.userSelect = '';
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
  });

  resizer.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startH = mainPanelWrap.getBoundingClientRect().height;
    resizer.classList.add('dragging');

    const onTouchMove = e => { e.preventDefault(); onMove(e.touches[0].clientY); };
    const onTouchEnd = () => {
      resizer.classList.remove('dragging');
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
    };
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onTouchEnd);
  });

  // 初期高さを画面の約45%に設定
  mainPanelWrap.style.height = (document.getElementById('app').clientHeight * 0.45) + 'px';

  document.getElementById('dev-reset-btn').addEventListener('click', () => {
    if (!confirm('セーブデータをすべて削除してリセットしますか？')) return;
    localStorage.removeItem('fr_save_v1');
    location.reload();
  });
</script>
</body>
</html>
